// ── STATE ─────────────────────────────────────────────────────────
let cur = { his: [], geo: [], mat: [] };

// ── HELPERS ───────────────────────────────────────────────────────
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pick30(pool, sub) {
  const key = 'prev_' + sub;
  const prev = localStorage.getItem(key) || '';
  let chosen, tries = 0;
  do {
    chosen = shuffle(pool).slice(0, 30);
    tries++;
  } while (tries < 30 && chosen.map(q => q.id).join(',') === prev);
  localStorage.setItem(key, chosen.map(q => q.id).join(','));
  return chosen;
}

// ── COMPLETION CHECK ──────────────────────────────────────────────
function checkComplete(sub) {
  let answered = 0;
  for (let i = 0; i < 30; i++) {
    if (document.querySelector('input[name="' + sub + 'q' + i + '"]:checked')) answered++;
  }
  document.getElementById('sub-' + sub).disabled = answered < 30;
}

// ── RENDER ────────────────────────────────────────────────────────
function render(sub) {
  const L = ['A','B','C','D'];
  const html = cur[sub].map((q, i) => `
    <div class="question" id="${sub}qd${i}">
      <p>${i + 1}. ${q.q}</p>
      <div>
        ${q.opts.map((o, oi) => `
          <label id="${sub}lbl${i}_${oi}">
            <input type="radio" name="${sub}q${i}" value="${oi}"> ${L[oi]}. ${o}
          </label>
        `).join('')}
      </div>
      <div class="answer" id="${sub}a${i}">
        &#10003; Correct Answer: ${L[q.ans]}. ${q.opts[q.ans]}
        <div class="ref">&#128218; ${q.ref}</div>
      </div>
    </div>
  `).join('');
  document.getElementById('quiz-' + sub).innerHTML = html;
  document.getElementById('score-' + sub).textContent = '';
  // disable submit until all 30 answered
  const submitBtn = document.getElementById('sub-' + sub);
  submitBtn.style.display = 'inline-block';
  submitBtn.disabled = true;
  // attach listeners to enable submit once all answered
  document.querySelectorAll('#quiz-' + sub + ' input[type="radio"]').forEach(r => {
    r.addEventListener('change', () => checkComplete(sub));
  });
}

// ── START ─────────────────────────────────────────────────────────
function start(sub) {
  const pool = sub === 'his' ? HQ : sub === 'geo' ? GQ : MQ;
  cur[sub] = pick30(pool, sub);
  render(sub);
}

// ── SUBMIT ────────────────────────────────────────────────────────
function doSubmit(sub) {
  let score = 0;
  cur[sub].forEach((q, i) => {
    // Lock all radio buttons for this question
    document.querySelectorAll('input[name="' + sub + 'q' + i + '"]').forEach(r => r.disabled = true);

    const sel = document.querySelector('input[name="' + sub + 'q' + i + '"]:checked');
    const qDiv = document.getElementById(sub + 'qd' + i);
    const ansDiv = document.getElementById(sub + 'a' + i);
    const isCorrect = sel && parseInt(sel.value) === q.ans;

    if (isCorrect) {
      score++;
      qDiv.classList.add('correct');
      // Correct: no answer reveal needed
    } else {
      qDiv.classList.add('wrong');
      ansDiv.style.display = 'block'; // show correct answer + reference
      if (sel) {
        // Mark the chosen wrong option in red
        document.getElementById(sub + 'lbl' + i + '_' + sel.value).classList.add('wrong-label');
      }
    }
  });

  document.getElementById('score-' + sub).textContent = 'Score: ' + score + ' / 30';
  document.getElementById('sub-' + sub).style.display = 'none';
}

// ── TAB SWITCH ────────────────────────────────────────────────────
function switchTab(sub) {
  document.getElementById('panel-his').style.display = sub === 'his' ? 'block' : 'none';
  document.getElementById('panel-geo').style.display = sub === 'geo' ? 'block' : 'none';
  document.getElementById('panel-mat').style.display = sub === 'mat' ? 'block' : 'none';
  const btns = document.querySelectorAll('.tab-btn');
  btns[0].classList.toggle('active', sub === 'his');
  btns[1].classList.toggle('active', sub === 'geo');
  btns[2].classList.toggle('active', sub === 'mat');
}

// ── INIT ──────────────────────────────────────────────────────────
start('his');
start('geo');
start('mat');
</script>
