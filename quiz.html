// ── STATE ─────────────────────────────────────────────────────────
let cur = { his: [], geo: [] };

// ── HELPERS ───────────────────────────────────────────────────────
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pick30(pool, sub) {
  const key = 'prev_' + sub;
  const prev = localStorage.getItem(key) || '';
  let chosen, tries = 0;
  do {
    chosen = shuffle(pool).slice(0, 30);
    tries++;
  } while (tries < 30 && chosen.map(q => q.id).join(',') === prev);
  localStorage.setItem(key, chosen.map(q => q.id).join(','));
  return chosen;
}

// ── RENDER ────────────────────────────────────────────────────────
function render(sub) {
  const letters = ['A','B','C','D'];
  const html = cur[sub].map((q, i) => `
    <div class="question">
      <p>${i + 1}. ${q.q}</p>
      <div>
        ${q.opts.map((o, oi) => `
          <label><input type="radio" name="${sub}q${i}" value="${oi}"> ${letters[oi]}. ${o}</label>
        `).join('')}
      </div>
      <div class="answer" id="${sub}a${i}">&#10003; Answer: ${letters[q.ans]}. ${q.opts[q.ans]}</div>
    </div>
  `).join('');
  document.getElementById('quiz-' + sub).innerHTML = html;
  document.getElementById('score-' + sub).textContent = '';
  document.getElementById('sub-' + sub).style.display = 'inline-block';
  document.getElementById('ret-' + sub).style.display = 'none';
}

// ── START ─────────────────────────────────────────────────────────
function start(sub) {
  cur[sub] = pick30(sub === 'his' ? HQ : GQ, sub);
  render(sub);
}

// ── SUBMIT ────────────────────────────────────────────────────────
function doSubmit(sub) {
  let score = 0;
  cur[sub].forEach((q, i) => {
    const sel = document.querySelector('input[name="' + sub + 'q' + i + '"]:checked');
    document.getElementById(sub + 'a' + i).style.display = 'block';
    if (sel && parseInt(sel.value) === q.ans) score++;
  });
  document.getElementById('score-' + sub).textContent = 'Score: ' + score + ' / 30';
  document.getElementById('sub-' + sub).style.display = 'none';
  document.getElementById('ret-' + sub).style.display = 'inline-block';
}

// ── TAB SWITCH ────────────────────────────────────────────────────
function switchTab(sub) {
  document.getElementById('panel-his').style.display = sub === 'his' ? 'block' : 'none';
  document.getElementById('panel-geo').style.display = sub === 'geo' ? 'block' : 'none';
  const btns = document.querySelectorAll('.tab-btn');
  btns[0].classList.toggle('active', sub === 'his');
  btns[1].classList.toggle('active', sub === 'geo');
}

// ── INIT ──────────────────────────────────────────────────────────
start('his');
start('geo');
